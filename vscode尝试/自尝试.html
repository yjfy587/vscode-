<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册页面</title>
    <style>
        .form-container {
            width: 300px;
            margin: 50px auto;
            font-family: Arial, sans-serif;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .phone-input {
            display: flex;
            gap: 10px;
        }
        
        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 120px;
        }
        
        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            flex: 1;
            box-sizing: border-box;
        }
        
        .code-input {
            display: flex;
            gap: 10px;
        }
        
        .code-input input {
            flex: 1;
        }
        
        .get-code-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .get-code-btn:hover {
            background: #45a049;
        }
        
        .register-btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .register-btn:hover {
            background: #0056b3;
        }
        
        input::placeholder {
            color: #999;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <!-- 手机号输入 -->
        <div class="form-group">
            <label>手机号码</label>
            <div class="phone-input">
                <select>
                    <option>中国大陆 +86</option>
                    <option>香港 +852</option>
                    <option>澳门 +853</option>
                    <option>台湾 +886</option>
                </select>
                <input type="tel" placeholder="请输入你的手机号码">
            </div>
        </div>
        
        <!-- 验证码输入 -->
        <div class="form-group">
            <label>验证码</label>
            <div class="code-input">
                <input type="text" placeholder="请输入校验码">
                <button type="button" class="get-code-btn">获取验证码</button>
            </div>
        </div>
        
        <!-- 注册按钮 -->
        <button class="register-btn">注册</button>
    </div>
</body>
</html>
