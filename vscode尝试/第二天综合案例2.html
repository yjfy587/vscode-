<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>注册信息</h1>
    <form action="">
        <h2>个人信息</h2>
        <label>姓名</label><input type="text" placeholder="请输入真实姓名">
        <br><br>
        <label>密码</label><input type="password" placeholder="请输入密码">
        <br><br>
        <label>确认密码</label><input type="password" placeholder="请输入确认密码">
        <br><br>
        <label>性别：<input type="radio" name="gender">男<input type="radio" name="gender">女
        <br><br>
        居住城市：
        <select>
            <option>北京</option>
        </select>
        <br><br>
        <h2>教育经历</h2>
        <label>最高学历</label>
        <select>
            <option>博士</option>
        </select>
        <br><br>
        <label>学校名称</label><input type="text">
        <br><br>
        <label>所学专业</label><input type="text">
        <br><br>
        在校时间：
        <select>
            <option>2015</option>
        </select>
        --
        <select>
            <option>2019</option>
        </select>
        <h2>工作经历</h2>
        <label>公司名称：</label><input type="text">
        <br><br>
        <label>工作描述：</label><br>
        <textarea></textarea>
        <br>
        <input type="radio">已阅读以下协议
        <br>
        <ul>
            <li><a href="www.baidu.com">《用户服务协议》</a></li>
            <li><a href="www.baidu.com">《隐私政策》</a></li>
        </ul>
        <button type="submit">免费注册</button>
        <button type="reset">重新填写</button>
    </form>
</body>
</html>
